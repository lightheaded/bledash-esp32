; PlatformIO project — bledash-esp32
; MINI ESP32-C3 dev board with onboard 0.42" 72x40 SSD1306 OLED.

; micro-ecc curve selection — the EcoFlow handshake needs only secp160r1; compile
; out the other four curves to save flash. Shared by the device and native envs.
[ecc]
build_flags =
    -DuECC_SUPPORTS_secp160r1=1
    -DuECC_SUPPORTS_secp192r1=0
    -DuECC_SUPPORTS_secp224r1=0
    -DuECC_SUPPORTS_secp256r1=0
    -DuECC_SUPPORTS_secp256k1=0

[env:esp32-c3-mini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; The C3 has native USB (USB-Serial-JTAG). Route Serial over USB CDC so the
; monitor works over the same USB-C cable used for flashing.
; micro-ecc is vendored under an ef_uECC_* symbol prefix (lib/ef_microecc) so it
; links alongside NimBLE's own tinycrypt uECC_* without collision.
build_flags =
    ${ecc.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I src

lib_deps =
    olikraus/U8g2@^2.35.30
    h2zero/NimBLE-Arduino@^2.2.3

; Host-side unit tests for the device-independent layer (CRC, frame codecs,
; AES-CBC/MD5 crypto, session-key derivation, telemetry struct parsing). Runs on
; the dev machine — no board needed. `pio test -e native`.
[env:native]
platform = native
; `pio test` ignores src/ unless told to build it. Compile only the Arduino-free
; files on the host; exclude main.cpp and the NimBLE drivers. Add files here as
; the host-testable layer grows (E3 crypto).
test_build_src = true
build_src_filter =
    -<*>
    +<devices/ecoflow_proto.cpp>
    +<devices/ecoflow_crypto.cpp>
    +<devices/ecoflow_keytable.cpp>
    +<telemetry/line_protocol.cpp>
    +<telemetry/ring_log.cpp>
build_flags =
    ${ecc.build_flags}
    -I src
    -std=gnu++17
; The vendored lib/ef_microecc has no framework tag; allow it under the
; framework-less native platform.
lib_compat_mode = off

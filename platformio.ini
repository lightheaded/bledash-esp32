; PlatformIO project — bledash-esp32
; MINI ESP32-C3 dev board with onboard 0.42" 72x40 SSD1306 OLED.

[env:esp32-c3-mini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; The C3 has native USB (USB-Serial-JTAG). Route Serial over USB CDC so the
; monitor works over the same USB-C cable used for flashing.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    olikraus/U8g2@^2.35.30
